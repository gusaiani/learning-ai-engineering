server {
    listen 80;
    server_name ai-tech-support.gustavosaiani.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ai-tech-support.gustavosaiani.com;

    ssl_certificate /etc/letsencrypt/live/ai-tech-support.gustavosaiani.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai-tech-support.gustavosaiani.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # SSE streaming requires disabling nginx's response buffering — otherwise
    # the agent's status/token events get held back and delivered in chunks.
    location / {
        proxy_pass http://127.0.0.1:8910;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    access_log /var/log/nginx/ai-tech-support.gustavosaiani.com-access.log;
    error_log /var/log/nginx/ai-tech-support.gustavosaiani.com-error.log;
}
